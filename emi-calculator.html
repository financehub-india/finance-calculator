<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="years" placeholder="Tenure (Years)">

<button onclick="calculate()">Calculate EMI</button>

<div class="result">
<p>Monthly EMI: ₹ <span id="emi"></span></p>
<p>Total Interest: ₹ <span id="interest"></span></p>
<p>Total Payment: ₹ <span id="total"></span></p>
</div>

</div>

<script>

function calculate(){

let P = parseFloat(document.getElementById("loan").value);
let annualRate = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

let R = annualRate/12/100;
let N = years*12;

let EMI = (P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

let totalPayment = EMI*N;
let totalInterest = totalPayment - P;

document.getElementById("emi").innerText = EMI.toFixed(0);
document.getElementById("interest").innerText = totalInterest.toFixed(0);
document.getElementById("total").innerText = totalPayment.toFixed(0);

}

</script>

</body>
</html>
