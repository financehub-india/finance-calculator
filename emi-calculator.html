<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator India</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:16px;
width:340px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
padding:12px;
margin:8px 0;
width:100%;
border-radius:8px;
border:none;
font-size:14px;
outline:none;
}

button{
padding:12px;
width:100%;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.result{
margin-top:18px;
text-align:left;
}

.result div{
margin:8px 0;
padding:12px;
background:#0f172a;
border-radius:8px;
font-size:14px;
display:flex;
justify-content:space-between;
}

.label{
font-weight:500;
}

.value{
font-weight:bold;
}

a{
color:#38bdf8;
text-decoration:none;
display:block;
margin-top:15px;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="months" placeholder="Tenure (Months)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="result"></div>

<a href="index.html">← Back to Home</a>

</div>

<script>

function formatIndianNumber(num){
return new Intl.NumberFormat('en-IN',{
minimumFractionDigits:2,
maximumFractionDigits:2
}).format(num);
}

function calculateEMI(){

let P=parseFloat(document.getElementById("loan").value);
let annualRate=parseFloat(document.getElementById("rate").value);
let months=parseFloat(document.getElementById("months").value);

if(!P || !annualRate || !months){
alert("Please fill all fields");
return;
}

let R=annualRate/12/100;
let N=months;

let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

let totalPayment=EMI*N;
let totalInterest=totalPayment-P;

document.getElementById("result").innerHTML=

"<div><span class='label'>Monthly EMI</span><span class='value'>₹ "+formatIndianNumber(EMI)+"</span></div>"+

"<div><span class='label'>Total Interest</span><span class='value'>₹ "+formatIndianNumber(totalInterest)+"</span></div>"+

"<div><span class='label'>Total Amount</span><span class='value'>₹ "+formatIndianNumber(totalPayment)+"</span></div>";

}

</script>

</body>
</html>
