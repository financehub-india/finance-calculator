<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free EMI Calculator India 2026 – Calculate Loan EMI Online</title>
<meta name="description" content="Free EMI calculator for India. Calculate home loan, car loan EMI instantly with interest breakdown.">
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}
.container{
max-width:600px;
margin:auto;
padding:20px;
}
input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}
button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}
a{
color:#38bdf8;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>EMI Calculator</h1>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="years" placeholder="Loan Tenure (Years)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="card" id="result"></div>

<br>
<a href="index.html">← Back to Home</a>

</div>

<script>
function calculateEMI(){
let P=document.getElementById("loan").value;
let R=document.getElementById("rate").value/1200;
let N=document.getElementById("years").value*12;

let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

document.getElementById("result").innerHTML=
"Monthly EMI: ₹ "+EMI.toFixed(2);
}
</script>

</body>
</html>
